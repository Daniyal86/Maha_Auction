<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MahaAuctions - Maharashtra Premium Statutory Auction & Heavy Deposit Portal</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <!-- Local Custom CSS -->
  <link rel="stylesheet" href="./index.css">

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            premium: {
              light: '#ffffff',
              bg: '#f8fafc',
              text: '#0f172a',
              muted: '#64748b',
              emerald: '#059669',
              emeraldHover: '#047857',
              gold: '#d97706',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons Library -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Laser scanning animation keyframe for QR code login */
    @keyframes scanEffect {
      0% { top: 10%; }
      50% { top: 90%; }
      100% { top: 10%; }
    }
    .animate-scan {
      animation: scanEffect 2s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col antialiased">

  <!-- Global Header Navigation -->
  <nav id="global-navbar" class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-slate-200 shadow-sm"></nav>

  <!-- Dynamic Page Mount Element -->
  <main id="app-content" class="flex-grow min-h-screen"></main>

  <!-- Global Footer -->
  <footer class="bg-slate-900 border-t border-slate-800 py-8 text-center text-slate-400">
    <div class="max-w-7xl mx-auto px-4 text-xs font-semibold uppercase tracking-wider space-y-2">
      <div>MahaAuctions © 2026 Maharashtra statutory portal. All rights reserved.</div>
      <div class="text-slate-600">SARFAESI Securities enforcement division | Registered DM certified partners</div>
    </div>
  </footer>

  <!-- ================= GLOBAL MODAL WRAPPERS ================= -->

  <!-- 1. Secure Authentication Modal -->
  <div id="auth-modal-wrapper" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <!-- Backdrop overlay -->
    <div id="auth-modal-close" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>

    <!-- Modal Card Window -->
    <div class="relative bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl border border-slate-200 z-10 flex flex-col text-left">
      
      <!-- Top banner header -->
      <div class="bg-gradient-to-r from-premium-emerald to-teal-600 px-6 py-8 text-white relative">
        <button id="auth-modal-close-x" onclick="document.getElementById('auth-modal-wrapper').classList.add('hidden')" class="absolute top-4 right-4 text-white/80 hover:text-white bg-black/10 hover:bg-black/20 p-2 rounded-full transition-colors">
          <i data-lucide="x" class="h-5 w-5"></i>
        </button>
        <div class="inline-flex items-center space-x-1.5 bg-white/20 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider mb-2">
          <i data-lucide="sparkles" class="h-3 w-3"></i>
          <span>Maharashtra Portal</span>
        </div>
        <h2 class="text-2xl font-extrabold tracking-tight">Secure Sign-In</h2>
        <p class="text-emerald-100 text-sm mt-1">Access instant auction alerts and legal guidance reports.</p>
      </div>

      <!-- Tab header controls -->
      <div class="flex border-b border-slate-100 bg-slate-50">
        <button class="auth-tab flex-1 py-4 text-sm font-semibold border-b-2 border-premium-emerald text-premium-emerald bg-white" data-tab="email">Email Login</button>
        <button class="auth-tab flex-1 py-4 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700" data-tab="google">Google</button>
        <button class="auth-tab flex-1 py-4 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700" data-tab="qr">Scan QR</button>
      </div>

      <!-- Main modal tab dynamic body -->
      <div id="auth-modal-content" class="p-6 bg-white min-h-[300px] flex flex-col justify-center">
        <!-- Rendered dynamically via JavaScript -->
      </div>

      <!-- Legal tag footer -->
      <div class="bg-slate-50 px-6 py-4 flex items-center justify-center space-x-2 text-xs font-semibold text-slate-500 border-t border-slate-100">
        <i data-lucide="shield-alert" class="h-4 w-4 text-emerald-500"></i>
        <span>Fully compliant with SARFAESI portal encryption.</span>
      </div>
    </div>
  </div>

  <!-- 2. 7-Day Free Trial Alert Lead Modal -->
  <div id="trial-modal-wrapper" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <!-- Backdrop overlay -->
    <div id="trial-modal-close" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>

    <div class="relative bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl border border-slate-200 z-10 p-6 flex flex-col text-left">
      <div id="trial-modal-content">
        <!-- Rendered dynamically via JavaScript -->
      </div>
    </div>
  </div>

  <!-- 3. Certified Agent Connect Lead Modal -->
  <div id="agent-modal-wrapper" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <!-- Backdrop overlay -->
    <div id="agent-modal-close" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>

    <div class="relative bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl border border-slate-200 z-10 p-6 flex flex-col text-left">
      <div id="agent-modal-content">
        <!-- Rendered dynamically via JavaScript -->
      </div>
    </div>
  </div>

  <!-- Leaflet Map Library Javascript dependency -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Core Javascript Application Driver -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
